<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guía Didáctica Vida Saludable</title>
    <link rel="icon" type="image/x-icon" href="logo.ico">
    <style>
        body {
            background: #111;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            color: #fff;
        }

        .topbar {
            flex: 0 0 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            background-color: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 20;
            box-sizing: border-box;
        }

        .title-container {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .topbar-logo {
            height: 28px;
            width: auto;
            object-fit: contain;
        }

        .document-title {
            font-size: 15px;
            font-weight: 500;
            color: #f5f5f5;
            letter-spacing: 0.3px;
        }

        .actions {
            display: flex;
            gap: 12px;
        }

        .btn-action {
            padding: 8px 18px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background-color: #ffffff;
            color: #000000;
            border: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .btn-primary:hover {
            background-color: #e0e0e0;
            transform: translateY(-1px);
        }

        .btn-outline {
            background-color: rgba(255, 255, 255, 0.08);
            color: #eaeaea;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-outline:hover {
            background-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        .viewer-area {
            flex: 1;
            position: relative;
            background-color: #111;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 90px; /* Espacio seguro para los botones */
            box-sizing: border-box;
        }

        .bg-blur {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(0.5);
            z-index: 1;
        }

        /* Bloquea la proporción matemática del visor para evitar que las páginas se separen */
        .book-aspect {
            height: 100%;
            max-width: 100%;
            aspect-ratio: 1240 / 874; /* Relación exacta de 2 páginas abiertas */
            z-index: 5;
        }

        #book {
            width: 100%;
            height: 100%;
        }

        .page {
            background-color: #fff;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            user-select: none;
            display: block;
            background-color: #fff;
        }

        .page-cover {
            background-color: #111;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
            width: 48px;
            height: 48px;
            font-size: 20px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-50%) scale(1.05);
        }

        .nav-btn.prev { left: 20px; }
        .nav-btn.next { right: 20px; }

        @media (max-width: 768px) {
            .viewer-area {
                padding: 20px 20px 80px 20px;
            }
            .book-aspect {
                aspect-ratio: 620 / 874; /* En móviles se muestra solo 1 página */
            }
            .nav-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
                top: auto;
                bottom: 15px;
                transform: none;
            }
            .nav-btn:hover {
                transform: scale(1.05);
            }
            .nav-btn.prev { left: 35%; }
            .nav-btn.next { right: 35%; }
            .topbar { flex-wrap: wrap; height: auto; padding: 12px 16px; gap: 12px; }
            .title-container { width: 100%; justify-content: flex-start; }
            .actions { gap: 8px; width: 100%; justify-content: flex-end; }
            .btn-action { padding: 8px 12px; font-size: 12px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
</head>
<body>

    <header class="topbar">
        <div class="title-container">
            <img src="logo.png" alt="Logo" class="topbar-logo" onerror="this.style.display='none'">
            <div class="document-title">Vida Saludable</div>
        </div>
        <div class="actions">
            <button id="btn-start" class="btn-action btn-outline">Ir al Inicio</button>
            <button id="btn-fullscreen" class="btn-action btn-outline">Pantalla Completa</button>
            <a href="#" id="download-link" class="btn-action btn-primary" download>Descargar PDF</a>
        </div>
    </header>

    <main class="viewer-area">
        <div class="bg-blur" id="bg-blur"></div>
        <button id="btn-prev" class="nav-btn prev" style="display: none;">&#10094;</button>
        
        <!-- Contenedor que restringe la deformación -->
        <div class="book-aspect">
            <div id="book"></div>
        </div>

        <button id="btn-next" class="nav-btn next">&#10095;</button>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            const totalPaginasReales = 8; 
            const modoPrueba = false; 
            const extension = 'jpg'; 
            const rutaPDF = 'guiavidasaludable.pdf'; 

            const anchoBase = 620;  
            const altoBase = 874;   
            
            document.getElementById('download-link').href = modoPrueba ? '#' : rutaPDF;

            const bgBlur = document.getElementById('bg-blur');
            if (modoPrueba) {
                bgBlur.style.backgroundImage = `url('https://placehold.co/${anchoBase}x${altoBase}/f8f9fa/333333?text=Portada')`;
            } else {
                bgBlur.style.backgroundImage = `url('paginas/1.${extension}')`;
            }

            const bookElement = document.getElementById('book');

            const paginasTotales = totalPaginasReales % 2 !== 0 ? totalPaginasReales + 1 : totalPaginasReales;

            for (let i = 1; i <= paginasTotales; i++) {
                const pageDiv = document.createElement('div');
                
                if (i === 1 || i === paginasTotales) {
                    pageDiv.className = 'page page-cover';
                } else {
                    pageDiv.className = 'page';
                }

                if (i > totalPaginasReales) {
                    pageDiv.style.backgroundColor = "#ffffff";
                } else {
                    const img = document.createElement('img');
                    img.draggable = false;
                    
                    if (modoPrueba) {
                        let texto = i === 1 ? 'Portada' : (i === totalPaginasReales ? 'Contraportada' : `Pagina ${i}`);
                        img.src = `https://placehold.co/${anchoBase}x${altoBase}/f8f9fa/333333?text=${texto}`;
                    } else {
                        img.src = `paginas/${i}.${extension}`; 
                    }
                    
                    img.alt = `Página ${i}`;
                    pageDiv.appendChild(img);
                }
                
                bookElement.appendChild(pageDiv);
            }

            try {
                const pageFlip = new St.PageFlip(bookElement, {
                    width: anchoBase,  
                    height: altoBase, 
                    size: "stretch", 
                    minWidth: 300,
                    maxWidth: 3000, /* Ampliado para no chocar con las restricciones CSS */
                    minHeight: 400,
                    maxHeight: 4000, /* Ampliado para no chocar con las restricciones CSS */
                    showCover: true, 
                    usePortrait: true,
                    maxShadowOpacity: 0.5,
                    mobileScrollSupport: false 
                });

                pageFlip.loadFromHTML(bookElement.querySelectorAll('.page'));

                // Control dinámico de las flechas
                function updateArrows(page) {
                    const total = pageFlip.getPageCount();
                    const prevBtn = document.getElementById('btn-prev');
                    const nextBtn = document.getElementById('btn-next');
                    
                    prevBtn.style.display = (page === 0) ? 'none' : 'flex';
                    nextBtn.style.display = (page >= total - 1) ? 'none' : 'flex';
                }

                pageFlip.on('flip', (e) => {
                    updateArrows(e.data);
                });

                setTimeout(() => {
                    updateArrows(pageFlip.getCurrentPageIndex());
                }, 50);

                document.getElementById('btn-prev').addEventListener('click', () => {
                    pageFlip.flipPrev();
                });

                document.getElementById('btn-next').addEventListener('click', () => {
                    pageFlip.flipNext();
                });

                document.getElementById('btn-start').addEventListener('click', () => {
                    pageFlip.flip(0);
                });

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft') {
                        pageFlip.flipPrev();
                    } else if (e.key === 'ArrowRight') {
                        pageFlip.flipNext();
                    }
                });

            } catch (error) {
                bookElement.innerHTML = `<div style="color:red; background:white; padding:20px; text-align:center;">Error al iniciar visor: ${error.message}</div>`;
                console.error(error);
            }

            const fullscreenBtn = document.getElementById('btn-fullscreen');
            
            fullscreenBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.error(`Error al iniciar pantalla completa: ${err.message}`);
                    });
                } else {
                    document.exitFullscreen();
                }
            });

            document.addEventListener('fullscreenchange', () => {
                if (document.fullscreenElement) {
                    fullscreenBtn.textContent = 'Salir';
                } else {
                    fullscreenBtn.textContent = 'Pantalla Completa';
                }
            });
        });
    </script>
</body>
</html>
